<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEM For All</title>

<style>
body{
margin:0;
font-family:Arial;
background: linear-gradient(135deg,#ffedd5,#fff7ed);
color:#1f2937;
}

header{
background: linear-gradient(90deg,#f97316,#fb923c);
color:white;
text-align:center;
padding:40px;
}

section{
background:white;
margin:20px auto;
padding:20px;
width:92%;
max-width:900px;
border-left:6px solid #f97316;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

img{
width:200px;
border-radius:12px;
border:3px solid #f97316;
}

#quizBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff3e0;
border-top:3px solid #f97316;
padding:10px;
display:flex;
justify-content:space-between;
font-weight:bold;
}

button{
padding:10px;
background:#f97316;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#ea580c;
}
</style>

</head>

<body>

<header>
<h1>STEM For All 🚀</h1>
<p>Learn Smart • Think Fast</p>
</header>

<section>
<h2>🧠 Math Tricks</h2>
<div>23×11=253</div>
<div>99²=9801</div>
<div>125×8=1000</div>
</section>

<section>
<h2>📘 Differentiation</h2>
<div>d(x^n)=n·x^(n-1)</div>
<div>d(sin x)=cos x</div>
<div>d(e^x)=e^x</div>
</section>

<section>
<h2>👨‍💻 Founder</h2>
<img src="Screenshot_2026-06-15-21-14-06-183.png">
<p><b>Bhuwan Singh Rajawat</b></p>
</section>

<!-- QUIZ BAR -->
<div id="quizBar">
<span id="timer">Time: 30</span>
<span id="score">Score: 0</span>
</div>

<script>

let quiz = [
"23 × 11 = 253",
"d(x²)/dx = 2x",
"99² = 9801",
"125 × 8 = 1000"
];

let time = 30;
let score = 0;
let i = 0;
let ended = false;

/* LOAD QUIZ (SAFE) */
function loadQuiz(){
if(i < quiz.length){
document.getElementById("score").innerText = "Score: " + score;
}else{
endQuiz();
}
}

/* TIMER START */
let timer = setInterval(()=>{
if(ended) return;

time--;
document.getElementById("timer").innerText = "Time: " + time;

if(time <= 0){
endQuiz();
}
},1000);

/* SCROLL END (SAFE) */
window.addEventListener("scroll",()=>{
if(ended) return;

let scrollTop = window.scrollY;
let docHeight = document.body.scrollHeight - window.innerHeight;

let percent = (scrollTop / docHeight) * 100;

if(percent > 90){
endQuiz();
}
});

/* END QUIZ (NO BUG) */
function endQuiz(){
if(ended) return;

ended = true;
clearInterval(timer);

document.getElementById("timer").innerText = "🏁 Quiz Ended";
document.getElementById("score").innerText = "Final Score: " + score;
}

/* START */
loadQuiz();

</script>

</body>
</html>
