<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEM For All</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background: linear-gradient(135deg, #1e3a8a, #7c3aed, #0f172a);
color:#e5e7eb;
}

/* HEADER */
header{
background: linear-gradient(90deg, #2563eb, #7c3aed);
text-align:center;
padding:50px 20px;
color:white;
}

header h1{
margin:0;
font-size:40px;
}

/* SECTION */
section{
background: rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
margin:20px auto;
padding:20px;
border-radius:16px;
width:92%;
max-width:900px;
backdrop-filter: blur(8px);
}

/* BOX */
div{
background: rgba(255,255,255,0.10);
border-left:4px solid #60a5fa;
padding:12px;
margin:10px 0;
border-radius:10px;
}

/* BUTTON */
button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

/* INPUT */
input{
padding:10px;
border-radius:8px;
border:none;
width:220px;
}

/* QUIZ */
#options button{
display:block;
width:100%;
text-align:left;
margin:6px 0;
background: rgba(255,255,255,0.15);
color:white;
border:1px solid rgba(255,255,255,0.2);
}

#timer{
color:#fbbf24;
font-weight:bold;
}

#score{
color:#34d399;
font-weight:bold;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background: rgba(0,0,0,0.3);
margin-top:30px;
}
</style>

</head>

<body>

<header>
<h1>STEM For All 🚀</h1>
<p>Learn Smart • Think Fast • Grow Strong</p>
</header>

<section>
<h2>📚 Mission</h2>
<p>Free STEM education for students.</p>
</section>

<section>
<h2>🧠 Quiz</h2>

<p id="question">Loading...</p>

<div id="options"></div>

<p id="timer">Time: 10</p>
<p id="score">Score: 0</p>

<p id="result"></p>
</section>

<footer>
© 2026 STEM For All
</footer>

<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

let quiz = [
{q:"d(x²)/dx = ?", options:["2x","x","x²"], answer:"2x"},
{q:"d(sin x)/dx = ?", options:["cos x","-sin x","sin x"], answer:"cos x"},
{q:"99² = ?", options:["9801","9900","9700"], answer:"9801"},
{q:"125 × 8 = ?", options:["1000","900","1100"], answer:"1000"}
];

let i=0;
let score=0;
let time=10;
let interval;

function startTimer(){
time=10;
document.getElementById("timer").innerText="Time: "+time;

interval=setInterval(()=>{
time--;
document.getElementById("timer").innerText="Time: "+time;

if(time==0){
clearInterval(interval);
next();
}
},1000);
}

function load(){
let q=quiz[i];
document.getElementById("question").innerText=q.q;

let opt="";
q.options.forEach(o=>{
opt+=`<button onclick="check('${o}')">${o}</button>`;
});

document.getElementById("options").innerHTML=opt;

startTimer();
}

function check(ans){
clearInterval(interval);

let correct=document.getElementById("correctSound");
let wrong=document.getElementById("wrongSound");

if(ans==quiz[i].answer){
score++;
document.getElementById("result").innerText="✅ Correct!";
correct.play();
}else{
document.getElementById("result").innerText="❌ Wrong!";
wrong.play();
}

document.getElementById("score").innerText="Score: "+score;

setTimeout(next,800);
}

function next(){
i++;

if(i<quiz.length){
document.getElementById("result").innerText="";
load();
}else{
document.getElementById("question").innerText="Quiz Finished 🎉";
document.getElementById("options").innerHTML="";
document.getElementById("timer").innerText="";
}
}

load();

</script>

</body>
</html>
